<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Not Defteri</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-light bg-white shadow-sm">
    <div class="container">
        <span class="navbar-brand mb-0 h5">📝 Not Defteri</span>
        <a href="/notlar_cikis" class="btn btn-outline-danger btn-sm">
            Çıkış
        </a>
    </div>
</nav>

<div class="container my-4">

    <!-- NOT EKLE -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form method="post">
                <div class="mb-2">
                    <input type="date"
       name="tarih"
       class="form-control"
       value="{{ '' }}">
                </div>

                <div class="mb-2">
                    <textarea name="not_metni"
                              class="form-control"
                              rows="3"
                              placeholder="Bugün ne not almak istiyorsun?"
                              required></textarea>
                </div>

                <button class="btn btn-success w-100">
                    ➕ Not Ekle
                </button>
            </form>
        </div>
    </div>

    <!-- NOT LİSTESİ -->
    {% for n in notlar %}
        <div class="card shadow-sm mb-3">
            <div class="card-body">
                <div class="small text-muted mb-1">
                    📅 {{ n[1]|format_date }}
                </div>

                <div class="mb-2" style="white-space:pre-wrap;">
                    {{ n[2] }}
                </div>

                <div class="d-flex gap-2">
                    <a href="/not_duzenle/{{ n[0] }}"
                       class="btn btn-outline-primary btn-sm w-50">
                        ✏️ Düzenle
                    </a>
                    <a href="/not_sil/{{ n[0] }}"
                       class="btn btn-outline-danger btn-sm w-50"
                       onclick="return confirm('Bu not silinsin mi?');">
                        🗑️ Sil
                    </a>
                </div>
            </div>
        </div>
    {% else %}
        <div class="alert alert-secondary text-center">
            Henüz not eklenmedi.
        </div>
    {% endfor %}

</div>

</body>
</html>
